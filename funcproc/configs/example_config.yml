# funcproc study config
# ---------------------
# Place this at <studydir>/code/funcproc.yml. Every value is optional; CLI flags always override it.

# ----- paths (default to <studydir>/derivatives/...) -----
derivatives: null        # e.g. /data/7T049_CVI_pRF_lund/derivatives
fmriprep_dir: null       # default: <derivatives>/fmriprep
pybest_dir: null         # default: <derivatives>/pybest
prf_dir: null            # default: <derivatives>/prf   (used later by 'prf')

# ----- acquisition -----
space: fsnative          
tasks: [8bars]           # tasks to process when -t is not given


# ----- denoising (pybest) -----
denoise:
  n_comps: 20            # PCA components


# ----- pRF fitting -----
prf:
  # design matrix: leave null to auto-find code/design_matrices/design_task-<task>.mat,
  # or set a path, or a per-task map (see note below).
  design_matrix: null

  hrf:
    pars: [1, 1, 0]
    deriv_bound: [0, 10]
    disp_bound: [0, 0]
  xtol: 1.0e-4
  ftol: 1.0e-4
  grid_nr: 20
  rsq_threshold: 0.1
  TR: 1.5
  filter_predictions: false
  n_jobs: 4
  n_batches: 10
  screen_size_cm: 39.3
  screen_distance_cm: 196
  dm_edges_clipping: [0, 0, 0, 0]
  normalize_RFs: false
  n_pix: 100
  eps: 1.0e-1
  fixed_grid_baseline: 0
  bold_bsl: [0, 0]
  prf_ampl: [0, 1000]
  constraints: false
  save_grids: true